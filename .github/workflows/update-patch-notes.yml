name: Update Megabonk Patch Notes

on:
  schedule:
    # Every 6 hours; offset from the top of the hour to reduce GitHub schedule delays.
    - cron: '23 */6 * * *'
  workflow_dispatch:
    inputs:
      send_test_email:
        description: Send a Gmail configuration test even when no patch changed
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: repository-content-writes
  cancel-in-progress: false

jobs:
  update-patch-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run updater tests
        run: python -m unittest tests.test_patch_notes_updater tests.test_patch_alert -v

      - name: Fetch official Steam announcements
        id: update
        shell: bash
        run: |
          RESULT=$(python scripts/update_patch_notes.py)
          echo "$RESULT"
          RESULT_JSON="$RESULT" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          result = json.loads(os.environ["RESULT_JSON"])
          print(f"page_changed={str(result['page_changed']).lower()}")
          print(f"latest_version={result['latest_version']}")
          print(f"latest_edited={str(result['latest_edited']).lower()}")
          print(f"new_versions={','.join(result['new_versions'])}")
          PY

      - name: Validate generated files
        shell: bash
        run: |
          python -m py_compile scripts/update_patch_notes.py
          python -m py_compile scripts/send_patch_alert.py
          python - <<'PY'
          import json
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          page = Path("guides/patch-notes/index.html").read_text(encoding="utf-8")
          state = json.loads(Path("data/patch-notes-state.json").read_text(encoding="utf-8"))
          latest = state["latest_version"]

          required = [
              f'<meta name="patch-version" content="{latest}">',
              f'Megabonk Patch Notes V{latest}',
              "<!-- PATCH_AUTO_LATEST_START -->",
              "<!-- PATCH_AUTO_LATEST_END -->",
              "<!-- PATCH_AUTO_DIRECTORY_START -->",
              "<!-- PATCH_AUTO_DIRECTORY_END -->",
              "<!-- PATCH_AUTO_SECTIONS_START -->",
              "<!-- PATCH_AUTO_SECTIONS_END -->",
          ]
          missing = [value for value in required if value not in page]
          if missing:
              raise SystemExit(f"Missing required patch page markers/content: {missing}")

          ids = re.findall(r'\sid="([^"]+)"', page)
          duplicates = sorted({value for value in ids if ids.count(value) > 1})
          if duplicates:
              raise SystemExit(f"Duplicate HTML ids: {duplicates}")

          ET.parse("sitemap.xml")
          print(f"Validated patch notes V{latest}")
          PY
          git diff --check

      - name: Commit and push when data changed
        id: publish
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add guides/patch-notes/index.html sitemap.xml data/patch-notes-state.json

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No patch-note changes found." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          VERSION=$(python -c "import json; print(json.load(open('data/patch-notes-state.json', encoding='utf-8'))['latest_version'])")
          git commit -m "Auto-update patch notes to V${VERSION}"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              echo "Updated Patch Notes to V${VERSION}." | tee -a "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying after refresh."
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done

          echo "Unable to push Patch Notes update after 3 attempts." >&2
          exit 1


      - name: Send requested test email
        if: ${{ success() && github.event_name == 'workflow_dispatch' && inputs.send_test_email }}
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PATCH_ALERT_EMAIL: ${{ secrets.PATCH_ALERT_EMAIL }}
        run: python scripts/send_patch_alert.py test

      - name: Send version update email
        if: ${{ success() && steps.update.outputs.page_changed == 'true' && steps.publish.outputs.changed == 'true' }}
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PATCH_ALERT_EMAIL: ${{ secrets.PATCH_ALERT_EMAIL }}
          PATCH_NEW_VERSIONS: ${{ steps.update.outputs.new_versions }}
          PATCH_LATEST_EDITED: ${{ steps.update.outputs.latest_edited }}
          PATCH_COMMIT_SHA: ${{ steps.publish.outputs.commit_sha }}
        run: python scripts/send_patch_alert.py update

      - name: Send workflow failure email
        if: ${{ failure() }}
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PATCH_ALERT_EMAIL: ${{ secrets.PATCH_ALERT_EMAIL }}
        run: python scripts/send_patch_alert.py failure
