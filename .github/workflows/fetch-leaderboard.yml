name: Fetch Megabonk Leaderboard

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: repository-content-writes
  cancel-in-progress: false

jobs:
  fetch-leaderboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        echo "📦 Installing cloudscraper for Cloudflare bypass..."
        pip install cloudscraper
        echo "✅ Installation complete"
    
    - name: Fetch leaderboard data
      run: |
        python << 'EOF'
        import cloudscraper
        import json
        import time
        from datetime import datetime
        from pathlib import Path

        API_URL = 'https://megabonk.fun/api/leaderboard'

        print('📡 Fetching data from megabonk.fun...')
        print('🛡️  Using cloudscraper to bypass Cloudflare challenge...')
        
        max_retries = 3
        for attempt in range(max_retries):
            try:
                if attempt > 0:
                    wait_time = attempt * 3
                    print(f'⏳ Waiting {wait_time}s before retry...')
                    time.sleep(wait_time)
                
                # Create cloudscraper instance (handles Cloudflare automatically)
                scraper = cloudscraper.create_scraper(
                    browser={
                        'browser': 'chrome',
                        'platform': 'windows',
                        'desktop': True
                    }
                )
                
                print('🌐 Sending request...')
                response = scraper.get(API_URL, timeout=30)
                
                print(f'📊 Response status: {response.status_code}')
                print(f'📏 Content length: {len(response.content)} bytes')
                
                if response.status_code != 200:
                    print(f'⚠️  Non-200 status code: {response.status_code}')
                    print(f'🔍 Response headers: {dict(response.headers)}')
                    if attempt < max_retries - 1:
                        continue
                
                response.raise_for_status()
                
                # Parse JSON
                data = None
                
                # Method 1: Direct JSON parsing
                try:
                    print('🔍 Parsing JSON...')
                    data = response.json()
                    print(f'✅ Successfully parsed {len(data)} entries')
                except Exception as e:
                    print(f'❌ JSON parsing failed: {e}')
                    print(f'📝 First 500 chars of response: {response.text[:500]}')
                    
                    # Method 2: Try manual parsing
                    try:
                        data = json.loads(response.text)
                        print(f'✅ Manual parsing succeeded! {len(data)} entries')
                    except Exception as e2:
                        print(f'❌ Manual parsing also failed: {e2}')
                        if attempt < max_retries - 1:
                            continue
                        raise
                
                if data is None or not isinstance(data, list):
                    raise Exception(f'Invalid data format. Got: {type(data)}')
                
                print(f'✅ Successfully got {len(data)} entries')
                
                # Create output directory
                output_dir = Path('data')
                output_dir.mkdir(exist_ok=True)
                
                # Build complete data structure
                output = {
                    'source': 'megabonk.fun',
                    'source_url': API_URL,
                    'fetched_at': datetime.utcnow().isoformat() + 'Z',
                    'count': len(data),
                    'data': data
                }
                
                # Save main file
                with open('data/leaderboard.json', 'w', encoding='utf-8') as f:
                    json.dump(output, f, ensure_ascii=False, indent=2)
                
                # Save minified version
                with open('data/leaderboard.min.json', 'w', encoding='utf-8') as f:
                    json.dump(output, f, ensure_ascii=False, separators=(',', ':'))
                
                print('💾 Data saved successfully')
                print(f'📊 Total entries: {len(data)}')
                
                if len(data) > 0:
                    first_entry = data[0]
                    print(f'🔑 First entry keys: {list(first_entry.keys())}')
                    
                    # Try to find player name field
                    player_name = (first_entry.get('name') or 
                                 first_entry.get('player') or 
                                 first_entry.get('username') or 
                                 first_entry.get('user') or
                                 'Unknown')
                    score = (first_entry.get('kills') or 
                           first_entry.get('score') or 
                           first_entry.get('points') or 0)
                    print(f'👤 Top player: {player_name} - {score:,}')
                    print(f'🥇 First entry: {first_entry}')
                
                # Success - exit the retry loop
                break
                
            except Exception as e:
                print(f'❌ Error on attempt {attempt + 1}/{max_retries}: {type(e).__name__}: {e}')
                if attempt == max_retries - 1:
                    print('🚨 All attempts failed!')
                    raise
        
        print('✨ Fetch completed successfully')
        EOF
    
    - name: Commit data to repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add data/leaderboard.json data/leaderboard.min.json
        
        if git diff --staged --quiet; then
          echo "📝 No changes in data, skipping commit"
        else
          git commit -m "🤖 Update leaderboard $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ Data updated and pushed to repository"
        fi
    
    - name: Display summary
      run: |
        echo "==================================================="
        echo "✅ Leaderboard fetch completed"
        echo "📅 Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "📍 Data location: data/leaderboard.json"
        echo "==================================================="
